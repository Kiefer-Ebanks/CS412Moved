<!-- Description: The base template for the voter analytics app -->
<!-- The base template for the voter analytics app that will be used to inherit by other templates -->

{% load static %} <!-- loading static files for css styling -->

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Voter Analytics</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="{% static 'voter_analytics_styles.css' %}">
    </head>
    <body>
        <header class="site-header">
            <h1 class="site-title">Voter Analytics</h1>
            <nav class="site-nav" aria-label="Main">
                <ul>
                    <li><a href="{% url 'home' %}">Home</a></li>
                    <li><a href="{% url 'graphs' %}">Graphs</a></li>
                </ul>
            </nav>
        </header>

        <main class="site-main">
            {% block content %}
            {% endblock %}
        </main>

    </body>

</html>
