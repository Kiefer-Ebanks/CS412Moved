<!-- The html template that takes in context from the views.py one_joke function and 
links to base.html to display the single dad joke -->

<html>
    <head>
        <title>One Joke</title>
    </head>
    <body>
        {% block content %} <!-- creating the information that will be subsituted in the base.html template-->
        <h1>Here's a joke for you:</h1>
        <p>{{ joke.text }}</p>
        {% endblock %}
    </body>
</html>
