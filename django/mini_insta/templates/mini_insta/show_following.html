<!-- Description: The page that displays the profiles that a profile follows -->
<!-- The html template for the profiles that a profile follows that takes in context from the views.py ShowFollowingDetailView function to display the profiles -->

{% extends 'mini_insta/base.html' %} <!-- linking to the base.html template-->

{% block content %}
<main class="follow-list-main">
    <h1 class="follow-list-title"><span><a href="{% url 'show_profile' profile.pk %}" class="profile-link-heading">{{ profile.display_name }}</a></span> is following</h1>
    <div class="follow-list-card">
        <div class="followers-container">
        <!-- displaying the profiles that the profile follows -->
        {% for followed in profile.get_following %}
        <div class="follower-item">
            <a href="{% url 'show_profile' followed.pk %}" class="follower-item-link">
                <span class="follower-avatar">
                    {% if followed.profile_image_url %}
                    <img src="{{ followed.profile_image_url }}" alt="{{ followed.display_name }}" class="follower-image">
                    {% else %}
                    <img src="https://alliancehealthprofessionals.com/wp-content/themes/apexclinic/images/no-image/No-Image-Found-400x264.png" alt="No image" class="follower-image">
                    {% endif %}
                </span>
                <span class="follower-name">{{ followed.display_name }}</span>
            </a>
        </div>
        {% empty %}
        <p>Not following anyone yet.</p>
        {% endfor %}
        </div>
    </div>
</main>
{% endblock %}
