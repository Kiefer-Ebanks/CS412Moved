<!-- Description: The form template for creating a new post -->
<!-- The html template for the form to create a new post that takes in context from the views.py CreatePostView function to create the post -->

{% extends 'mini_insta/base.html' %} <!-- linking to the base.html template-->

{% block content %}
<main class="profile-edit-main">
    <div class="profile-container">
        <div class="profile-content">
            <h1>Create a Post</h1>

            <!-- displaying the form to create a new post -->
            <form action="{% url 'create_post' %}" method="POST" enctype="multipart/form-data" class="profile-edit-form">
                {% csrf_token %}

                <div class="form-group">
                    <label for="{{ form.caption.id_for_label }}">Caption</label>
                    {{ form.caption }}
                </div>

                <div class="form-group">
                    <label for="files">Images</label>
                    <input id="files" type="file" multiple name="files">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Create Post</button>
                    <a href="{% url 'show_profile' profile.pk %}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</main>
{% endblock %}
